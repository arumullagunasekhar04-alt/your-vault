<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Vault | Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #F9F8F6; color: #1A1A1A; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: white; padding: 15px; border: 1px solid #D9D4CC; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #C54E35; }
        .card img { width: 100%; height: 200px; object-fit: contain; }
        .buy-btn { display: inline-block; background: #1A1A1A; color: white; padding: 10px 20px; text-decoration: none; margin-top: 10px; }
        #admin-panel { display: none; background: #EBE8E2; padding: 20px; border: 1px solid #1A1A1A; margin-bottom: 30px; }
        .admin-trigger { font-size: 10px; color: #ccc; cursor: pointer; text-align: center; margin-top: 50px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1 style="text-align:center; font-family:'Cormorant Garamond', serif;">YOUR VAULT</h1>

    <div id="admin-panel">
        <h3>Add New Product (Private)</h3>
        <input type="text" id="name" placeholder="Product Name">
        <input type="text" id="price" placeholder="Price (e.g. ₹999)">
        <input type="text" id="img" placeholder="Paste Image URL">
        <input type="text" id="link" placeholder="Paste Amazon Affiliate Link">
        <button onclick="saveProduct()" style="padding: 10px 20px; background: #C54E35; color: white; border: none; cursor: pointer;">Add to Website</button>
    </div>

    <div class="product-grid" id="product-grid">
        </div>

    <div class="admin-trigger" onclick="login()">Admin Login</div>

    <script>
        // Connected to your Supabase Project: YourVault
        const client = supabase.createClient("https://cxrofosdlooeyniddhdp.supabase.co", "sb_publishable_x2VXaOaw-K_ej6KvV-StEw_QXWqvHBq");

        function login() {
            let pw = prompt("Enter Admin Password:");
            if(pw === "Guna2026") { 
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                alert("Incorrect.");
            }
        }

        async function saveProduct() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const image_url = document.getElementById('img').value;
            const affiliate_link = document.getElementById('link').value;

            const { error } = await client.from('products').insert([{ name, price, image_url, affiliate_link }]);
            
            if (error) alert("Error: " + error.message);
            else { alert("Product Added Successfully!"); location.reload(); }
        }

        async function fetchProducts() {
            const { data } = await client.from('products').select('*');
            const grid = document.getElementById('product-grid');
            if (data && data.length > 0) {
                grid.innerHTML = data.map(p => `
                    <div class="card">
                        <img src="${p.image_url}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <p>${p.price}</p>
                        <a href="${p.affiliate_link}" target="_blank" class="buy-btn">View on Amazon</a>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = "<p style='text-align:center; width:100%;'>No products in the vault yet. Log in below to add your first one!</p>";
            }
        }
        fetchProducts();
    </script>
</body>
</html>
